global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics

  - job_name: collector-health
    static_configs:
      - targets: ["otel-collector:13133"]
    metrics_path: /metrics
