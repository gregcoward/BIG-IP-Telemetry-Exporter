apiVersion: apps/v1
kind: Deployment
metadata:
  name: bigip-telemetry-backend
  labels:
    app.kubernetes.io/name: bigip-telemetry-backend
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bigip-telemetry-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bigip-telemetry-backend
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: backend
          # Not published to Docker Hub — build locally (overlay: local) or set IMAGE when deploying.
          image: bigip-telemetry-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: OTLP_HTTP_ENDPOINT
              value: http://otel-collector.bigip-telemetry.svc.cluster.local:4318
            # Browser links use the request Host (your machine IP when port-forward uses --address 0.0.0.0).
            - name: COLLECTOR_CONFIG_PATH
              value: /tmp/collector-config.yaml
            - name: COLLECTOR_RESTART_HINT
              value: kubectl -n bigip-telemetry rollout restart deployment/otel-collector
            - name: COLLECTOR_RESTART_MODE
              value: kubernetes
            - name: COLLECTOR_HEALTH_URL
              value: http://otel-collector.bigip-telemetry.svc.cluster.local:13133
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      # Pods must reach BIG-IP management IPs on your network (often outside the cluster).
      # If polls fail with timeouts, confirm routing/NP/firewall from the pod network to BIG-IP:443.
