apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: otel-collector
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - bigip-telemetry
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: otel-collector
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: prometheus
      - job_name: otel-collector-health
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - bigip-telemetry
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: otel-collector
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: health
