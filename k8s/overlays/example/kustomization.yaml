apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Point at your container registry after building the backend image.
images:
  - name: bigip-telemetry-exporter
    newName: ghcr.io/gregcoward/bigip-telemetry-exporter
    newTag: "1.0.0"

patches:
  - target:
      kind: Ingress
      name: bigip-telemetry
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: bigip-telemetry.mycompany.example
      - op: replace
        path: /spec/rules/1/host
        value: prometheus.bigip-telemetry.mycompany.example
