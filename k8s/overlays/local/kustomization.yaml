apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: delete-ingress.yaml
  - path: deployment-backend-local.yaml

# Use an image built on your machine (see scripts/k8s-load-image.sh).
images:
  - name: bigip-metrics-exporter
    newName: bigip-metrics-exporter
    newTag: latest
